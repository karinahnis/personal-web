<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Web Karina</title>
    <link rel="stylesheet" href="global.css" />
  </head>
  <body>
    <div class="w-full bg-slate-950 h-screen overflow-hidden space-y-4 pb-20">
      <header class="max-w-6xl mx-auto p-4 md:p-6 sticky top-0 z-50">
        <nav
          class="bg-white rounded-full p-2 pl-4 md:pl-6 flex items-center justify-between shadow-2xl"
        >
          <div class="flex items-center gap-2">
            <div
              class="bg-orange-500 text-white w-8 h-8 md:w-9 md:h-9 rounded-full flex items-center justify-center font-bold text-xs"
            >
              PW
            </div>
            <span
              class="text-orange-500 text-lg md:text-2xl font-bold tracking-tight"
              >Personal Web</span
            >
          </div>
          <ul
            class="hidden lg:flex items-center gap-7 text-[15px] font-semibold text-gray-800"
          >
            <li>
              <a href="#" class="hover:text-orange-500 transition-colors"
                >Home</a
              >
            </li>
            <li><a href="#" class="text-orange-500">About</a></li>
            <li>
              <a href="#" class="hover:text-orange-500 transition-colors"
                >Contact</a
              >
            </li>
          </ul>
          <a
            href="#"
            class="bg-orange-500 hover:bg-orange-600 text-white px-5 md:px-8 py-2 md:py-3 rounded-full font-bold text-xs md:sm transition-all flex items-center gap-2"
          >
            Let's Talk <span class="hidden md:inline">↗</span>
          </a>
        </nav>
      </header>
      <section class="text-white py-6 px-6 overflow-hidden">
        <div
          class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-12 lg:gap-20"
        >
          <div class="relative">
            <div
              class="absolute -top-4 -left-4 w-12 h-12 md:w-16 md:h-16 bg-orange-500 rounded-full z-0"
            ></div>
            <div
              class="absolute bottom-10 -right-4 w-10 h-10 md:w-14 md:h-14 bg-orange-300 rounded-full z-10 border-4 md:border-8 border-slate-950"
            ></div>
            <div
              class="relative z-0 w-64 h-64 sm:w-80 sm:h-80 lg:w-100 lg:h-100 rounded-full border-8 md:border-10 border-orange-500 overflow-hidden bg-gray-700"
            >
              <img
                src="kaoru.jpg"
                alt="Profile"
                class="w-full h-full object-cover"
              />
            </div>
          </div>
          <div class="flex-1 space-y-6 text-center md:text-left">
            <div>
              <h2 class="text-3xl lg:text-5xl font-bold leading-tight">
                Karina Hoirun Nisa
              </h2>
              <div id="container-text">
                <div
                  id="textRotator"
                  class="text-orange-500 text-lg font-medium mt-2"
                ></div>
              </div>
            </div>
            <div class="flex flex-wrap justify-center md:justify-start gap-4">
              <a
                href="#"
                class="bg-orange-500 hover:bg-orange-600 text-white px-8 py-3 rounded-full font-bold text-sm transition-all"
              >
                Contact me ↗
              </a>
              <a
                href="#"
                class="border border-gray-600 hover:border-orange-500 text-white px-8 py-3 rounded-full font-bold text-sm transition-all"
              >
                Download resume ☁
              </a>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script src="main.js"></script>
  </body>
</html>
